<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MOS Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #07100a;
      --surface:   #0b160e;
      --surface2:  #111f14;
      --surface3:  #182b1c;
      --gold:      #7a9e7e;
      --gold2:     #a3c9a8;
      --text:      #ceefd4;
      --text-dim:  #4a6650;
      --text-mid:  #8aaa90;
      --border:    rgba(122,158,126,0.12);
      --border-hi: rgba(122,158,126,0.28);
      --red:       #ff6b6b;
      --mono:      'Space Mono', monospace;
      --sans:      'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg); font-family: var(--sans); color: var(--text); overflow: hidden; }
    #layout       { display: flex; flex-direction: column; width: 100%; height: 100%; }
    #toolbar      { display: flex; align-items: center; gap: 5px; padding: 6px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); height: 44px; flex-shrink: 0; }
    #content-area { flex: 1; position: relative; background: #000; overflow: hidden; }
    #statusbar    { height: 22px; background: var(--surface2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 10px; flex-shrink: 0; }
    .tb-btn { width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;transition:background .12s,color .12s,border-color .12s; }
    .tb-btn:hover:not(:disabled){background:var(--surface3);color:var(--text);border-color:var(--border-hi);}
    .tb-btn:active:not(:disabled){transform:scale(.93);}
    .tb-btn:disabled{opacity:.3;cursor:not-allowed;}
    #url-wrap{flex:1;display:flex;align-items:center;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:0 10px;height:30px;transition:border-color .15s;}
    #url-wrap:focus-within{border-color:var(--border-hi);}
    #secure-icon{font-size:11px;margin-right:5px;flex-shrink:0;}
    #url-bar{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.04em;user-select:text;min-width:0;}
    #url-bar::placeholder{color:var(--text-dim);}
    #clear-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;padding:0 2px;}
    #clear-btn:hover{color:var(--text);}
    #go-btn{padding:0 14px;height:30px;flex-shrink:0;background:var(--gold);color:#000;border:none;border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:background .12s;}
    #go-btn:hover{background:var(--gold2);}
    #loading-bar{position:absolute;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .25s ease;z-index:10;pointer-events:none;box-shadow:0 0 8px rgba(122,158,126,.6);}
    #page-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff;}
    #status-text{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
  </style>
</head>
<body>

<!-- UI unchanged -->

<script>
"use strict";

const ENGINES = {
  ddg: (q) => "https://duckduckgo.com/?q=" + encodeURIComponent(q) + "&ia=web",
  brave: (q) => "https://search.brave.com/search?q=" + encodeURIComponent(q),
  google: (q) => "https://www.google.com/search?q=" + encodeURIComponent(q),
};

let currentEngine = "ddg";
let _realUrl = "";

const urlBar = document.getElementById("url-bar");
const secureIcon = document.getElementById("secure-icon");

// ✅ FIXED normalise
function normalise(input) {
  input = (input || '').trim();
  if (!input) return null;

  if (input.startsWith('/fetch?url=')) return input;

  if (/^https?:\/\//i.test(input)) {
    return input;
  }

  if (/\.[a-z]{2,}(\/|$)/i.test(input) && !/\s/.test(input)) {
    return "https://" + input;
  }

  return ENGINES[currentEngine](input);
}

// ✅ FIXED updateSecure
function updateSecure(u) {
  if (!u) { secureIcon.textContent = ""; return; }

  u = String(u);

  if (u.startsWith("https://")) {
    secureIcon.textContent = "🔒";
    secureIcon.style.color = "#4ade80";
  } else {
    secureIcon.textContent = "⚠";
    secureIcon.style.color = "#febc2e";
  }
}
</script>
</body>
</html>
