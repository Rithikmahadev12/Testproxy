<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Browser</title>
  <style>
    :root {
      --bg:       #07100a;
      --surface:  #0b160e;
      --surface2: #111f14;
      --surface3: #182b1c;
      --gold:     #7a9e7e;
      --gold2:    #a3c9a8;
      --text:     #ceefd4;
      --text-dim: #4a6650;
      --text-mid: #8aaa90;
      --border:   rgba(122,158,126,0.12);
      --border-hi:rgba(122,158,126,0.28);
      --mono:     'Space Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────── */

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      height: 42px;
      flex-shrink: 0;
    }

    .tb-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .tb-btn:hover  { background: var(--surface3); color: var(--text); }
    .tb-btn:active { transform: scale(0.95); }
    .tb-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #url-bar {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.15s;
      user-select: text;
    }
    #url-bar:focus { border-color: var(--border-hi); }

    #go-btn {
      padding: 0 14px;
      height: 28px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    #go-btn:hover { background: var(--gold2); }

    /* ── Content area ────────────────────────────────────── */

    #layout {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
    }

    #content-area {
      flex: 1;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    #page-frame {
      width: 100%; height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* ── New Tab / Home ──────────────────────────────────── */

    #newtab {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg);
      z-index: 2;
    }

    #newtab.hidden { display: none; }

    .nt-logo {
      color: var(--gold);
      margin-bottom: 4px;
    }

    .nt-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--text);
    }

    .nt-title span { color: var(--gold); }

    .nt-search-wrap {
      display: flex;
      gap: 6px;
      width: 460px;
      max-width: 90vw;
    }

    #nt-search {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      user-select: text;
    }
    #nt-search:focus { border-color: var(--gold); }
    #nt-search::placeholder { color: var(--text-dim); }

    #nt-go {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.12s;
    }
    #nt-go:hover { background: var(--gold2); }

    .nt-quick-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 460px;
    }

    .nt-link {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-mid);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .nt-link:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hi); }

    /* ── Loading bar ─────────────────────────────────────── */

    #loading-bar {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--gold);
      transition: width 0.2s ease;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Status bar ──────────────────────────────────────── */

    #statusbar {
      height: 20px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    #status-text {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #status-secure {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .secure-yes { color: #4ade80; }
    .secure-no  { color: #ff6b6b; }
  </style>
</head>
<body>

<div id="layout">

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="tb-btn" id="btn-back" title="Back" onclick="navBack()" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <button class="tb-btn" id="btn-fwd" title="Forward" onclick="navFwd()" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <button class="tb-btn" id="btn-reload" title="Reload" onclick="navReload()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M13 8A5 5 0 113 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M13 4v4h-4"         stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="tb-btn" title="Home" onclick="goHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <input id="url-bar" id="rogoisdabest" type="text" placeholder="Search or enter address…" spellcheck="false" autocomplete="off"/>
    <button id="go-btn" onclick="navigate()">GO</button>
  </div>

  <!-- Content -->
  <div id="content-area">
    <div id="loading-bar"></div>

    <!-- New Tab page -->
    <div id="newtab">
      <div class="nt-logo">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" style="color:#7a9e7e">
          <path d="M12 2L21.66 7.5V16.5L12 22L2.34 16.5V7.5Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
        </svg>
      </div>
      <div class="nt-title">MATRIARCHS <span>BROWSER</span></div>
      <div class="nt-search-wrap">
        <input id="nt-search" type="text" placeholder="Search Google or enter URL…" spellcheck="false" autocomplete="off"/>
        <button id="nt-go" onclick="ntNavigate()">GO</button>
      </div>
      <div class="nt-quick-links">
        <div class="nt-link" onclick="loadUrl('https://www.google.com')">Google</div>
        <div class="nt-link" onclick="loadUrl('https://www.youtube.com')">YouTube</div>
        <div class="nt-link" onclick="loadUrl('https://www.wikipedia.org')">Wikipedia</div>
        <div class="nt-link" onclick="loadUrl('https://github.com')">GitHub</div>
        <div class="nt-link" onclick="loadUrl('https://www.reddit.com')">Reddit</div>
        <div class="nt-link" onclick="loadUrl('https://news.ycombinator.com')">HN</div>
      </div>
    </div>

    <!-- Proxy iframe -->
    <iframe id="page-frame" src="about:blank" sandbox="allow-scripts allow-forms allow-same-origin allow-popups" style="display:none"></iframe>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-text">Ready</span>
    <span id="status-secure"></span>
  </div>

</div>

<script>
"use strict";

// ── State ─────────────────────────────────────────────────────────────────────
const history  = [];
let historyIdx = -1;
let loading    = false;

// ── Elements ──────────────────────────────────────────────────────────────────
const urlBar    = document.getElementById("url-bar");
const frame     = document.getElementById("page-frame");
const newtab    = document.getElementById("newtab");
const ntSearch  = document.getElementById("nt-search");
const loadingBar= document.getElementById("loading-bar");
const statusTxt = document.getElementById("status-text");
const statusSec = document.getElementById("status-secure");
const btnBack   = document.getElementById("btn-back");
const btnFwd    = document.getElementById("btn-fwd");

// ── URL helpers ───────────────────────────────────────────────────────────────
function normaliseUrl(input) {
  input = input.trim();
  if (!input) return null;
  // If it looks like a URL (has a dot and no spaces, or starts with http)
  const looksLikeUrl = /^https?:\/\//i.test(input) || (/\.[a-z]{2,}(\/|$)/i.test(input) && !input.includes(" "));
  if (looksLikeUrl) {
    if (!/^https?:\/\//i.test(input)) input = "https://" + input;
    return input;
  }
  // Treat as Google search
  return "https://www.google.com/search?q=" + encodeURIComponent(input);
}

function proxyUrl(target) {
  return "/fetch?url=" + encodeURIComponent(target);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function loadUrl(url) {
  const norm = normaliseUrl(url);
  if (!norm) return;
  urlBar.value = norm;
  // Push history
  if (historyIdx < history.length - 1) history.splice(historyIdx + 1);
  history.push(norm); historyIdx = history.length - 1;
  updateNavBtns();
  showFrame(norm);
}

function navigate() {
  const input = urlBar.value.trim();
  if (input) loadUrl(input);
}

function ntNavigate() {
  const input = ntSearch.value.trim();
  if (input) { ntSearch.value = ""; loadUrl(input); }
}

function navBack() {
  if (historyIdx > 0) { historyIdx--; const url = history[historyIdx]; urlBar.value = url; showFrame(url); updateNavBtns(); }
}

function navFwd() {
  if (historyIdx < history.length - 1) { historyIdx++; const url = history[historyIdx]; urlBar.value = url; showFrame(url); updateNavBtns(); }
}

function navReload() {
  if (history[historyIdx]) showFrame(history[historyIdx]);
}

function goHome() {
  urlBar.value = "";
  frame.src = "about:blank";
  frame.style.display = "none";
  newtab.classList.remove("hidden");
  statusTxt.textContent = "Ready";
  statusSec.textContent = "";
  statusSec.className = "";
}

function updateNavBtns() {
  btnBack.disabled = historyIdx <= 0;
  btnFwd.disabled  = historyIdx >= history.length - 1;
}

// ── Frame loading ─────────────────────────────────────────────────────────────
function showFrame(targetUrl) {
  newtab.classList.add("hidden");
  frame.style.display = "block";

  const proxied = proxyUrl(targetUrl);
  setLoading(true);
  statusTxt.textContent = "Loading " + targetUrl;

  const isHttps = targetUrl.startsWith("https://");
  statusSec.textContent = isHttps ? "🔒 Secure" : "⚠ Not secure";
  statusSec.className   = isHttps ? "secure-yes" : "secure-no";

  frame.src = proxied;
}

function setLoading(on) {
  loading = on;
  if (on) {
    loadingBar.style.width = "0%";
    loadingBar.style.transition = "none";
    requestAnimationFrame(() => {
      loadingBar.style.transition = "width 0.8s ease";
      loadingBar.style.width = "75%";
    });
  } else {
    loadingBar.style.transition = "width 0.2s ease";
    loadingBar.style.width = "100%";
    setTimeout(() => { loadingBar.style.width = "0%"; loadingBar.style.transition = "none"; }, 300);
  }
}

frame.addEventListener("load", () => {
  setLoading(false);
  try {
    const frameUrl = frame.contentDocument?.location?.href;
    if (frameUrl && frameUrl !== "about:blank") statusTxt.textContent = frameUrl;
    else statusTxt.textContent = urlBar.value || "Ready";
  } catch { statusTxt.textContent = urlBar.value || "Loaded"; }
});

// ── Key bindings ──────────────────────────────────────────────────────────────
urlBar.addEventListener("keydown", e => {
  if (e.key === "Enter") navigate();
});

ntSearch.addEventListener("keydown", e => {
  if (e.key === "Enter") ntNavigate();
});

document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "l") { e.preventDefault(); urlBar.select(); }
  if ((e.ctrlKey || e.metaKey) && e.key === "r") { e.preventDefault(); navReload(); }
});

// ── postMessage from parent (mos.js) ─────────────────────────────────────────
window.addEventListener("message", (e) => {
  if (!e.data) return;
  if (e.data.type === "mos-navigate" && e.data.url) {
    loadUrl(e.data.url);
  }
});

// ── Proxy iframe internal navigation messages ─────────────────────────────────
window.addEventListener("message", (e) => {
  if (!e.data) return;
  if (e.data.type === "mos-navigate-proxy" && e.data.url) {
    urlBar.value = e.data.url;
    history.push(e.data.url); historyIdx = history.length - 1;
    updateNavBtns();
    statusTxt.textContent = e.data.url;
    const isHttps = e.data.url.startsWith("https://");
    statusSec.textContent = isHttps ? "🔒 Secure" : "⚠ Not secure";
    statusSec.className   = isHttps ? "secure-yes" : "secure-no";
  }
});

// Also fix the url-bar id alias (mos.js looks for id="rogoisdabest")
document.getElementById("rogoisdabest") || Object.defineProperty(document, "rogoisdabest", {
  get: () => urlBar
});
</script>
</body>
</html>
